services:
  deepseek-ocr:
    build: .
    container_name: deepseek-ocr-vllm
    expose:
      - "8000"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  nginx:
    image: nginx:alpine
    container_name: nginx-ssl-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/cert.pem:/etc/nginx/conf.d/cert.pem:ro
      - ./nginx/key.pem:/etc/nginx/conf.d/key.pem:ro
    depends_on:
      - deepseek-ocr
    restart: unless-stopped
